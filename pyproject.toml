[project]
name = "cipher"
version = "0.1.0"
description = "Unsupervised cipher cracking using MCMC and HMM approaches"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "numpy",
    "rich",
    "requests",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cipher"]

[project.scripts]
cipher = "cipher.cli:main"
